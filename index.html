<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcofinPay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0ea5e9">
  <link rel="apple-touch-icon" href="assets/Ecofin New Small trans.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .splash { animation: fadeOut 2.8s forwards; }
    @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-[#c9e8ff] min-h-screen">

  <!-- SPLASH -->
  <div id="splash" class="splash fixed inset-0 bg-[#c9e8ff] flex flex-col items-center justify-center z-50">
    <img src="assets/Ecofin New Small trans.png" alt="Logo" class="max-h-[130px] mb-6">
    <h1 class="text-4xl font-bold mb-1 tracking-tight text-emerald-800">EcofinPay</h1>
    <p class="text-xl tracking-widest text-emerald-700">Empowering Aspirations Faster</p>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden min-h-screen bg-[#c9e8ff]">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
      <div class="max-w-md w-full">
        <div class="text-center mb-8">
          <img src="assets/Ecofin New Small trans.png" alt="Logo" class="mx-auto h-24 mb-4">
          <h1 class="text-4xl font-bold text-emerald-800">ECOFINPAY</h1>
          <p class="text-emerald-700 text-lg">Empowering Aspirations Faster</p>
        </div>
        <div class="bg-white rounded-3xl shadow-xl p-8">
          <form id="login-form" class="space-y-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">User ID</label>
              <input type="text" id="userId" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input type="password" id="password" required class="w-full px-4 py-3 border border-gray-300 rounded-2xl">
            </div>
            <button type="submit" id="login-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-lg">
              Sign In
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- DASHBOARD (rest of your UI) -->
    <!-- ... I'll keep it short here. Add your full dashboard HTML if needed ... -->

  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz24mpGGvc_-AcRgdXdUQ0hQeUtkXlXGIB91plhd3DUppxI5ObvQDWMdZekG-BL78I8/exec";

    let currentUser = null;

    async function api(action, params = {}) {
      const fd = new FormData();
      fd.append('action', action);
      if (currentUser) fd.append('collectorId', currentUser.userId);
      for (const k in params) fd.append(k, params[k]);
      const res = await fetch(WEB_APP_URL, { method: 'POST', body: fd });
      return res.json();
    }

    async function login(userId, password) {
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const data = await api('login', { userId, password });
        console.log(data);
        if (data.success) {
          currentUser = data;
          localStorage.setItem('ecofinUser', JSON.stringify(data));
          alert("Login Successful! Welcome " + data.name);
          // Redirect or show dashboard here
          window.location.reload();
        } else {
          alert(data.message || "Login Failed");
        }
      } catch (e) {
        console.error(e);
        alert("Connection Error. Check console (F12)");
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // Form Submit
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value;
      if (userId && password) login(userId, password);
    });

    // Test on load
    window.onload = () => {
      setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
      }, 1500);
    };
  </script>
</body>
</html>
